name: Build Samsung APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -f -y \
            build-essential git python3-dev libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good libffi-dev \
            libssl-dev autoconf automake libtool pkg-config cmake ant ccache unzip
          pip install --upgrade pip
          pip install "Cython<3.0" wheel setuptools buildozer

      - name: Build with Buildozer
        run: |
          # Xóa lệnh pydeps gây lỗi, đi thẳng vào build debug
          # Buildozer sẽ tự động tải SDK/NDK và giải quyết phụ thuộc
          buildozer -v android debug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Samsung_Stable_v2.3
          path: bin/*.apk
          overwrite: true
