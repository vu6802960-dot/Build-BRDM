name: Build Samsung APK v4.4
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y build-essential git python3-dev libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev \
            libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good libffi-dev libssl-dev autoconf automake libtool \
            pkg-config cmake ant ccache unzip

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "Cython<3.0" wheel setuptools buildozer

      - name: Build with Buildozer
        run: |
          # Chấp nhận License một cách an toàn để tránh Broken pipe
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          expect -c "
          spawn $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          expect {
              \"*y/N*\" { exp_send \"y\r\"; exp_continue }
              eof
          }" || true
          
          # BỎ LỆNH PYDEPS - Chạy thẳng lệnh build
          buildozer -v android debug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Samsung_DeviceManager_v4.4
          path: bin/*.apk
          retention-days: 3
