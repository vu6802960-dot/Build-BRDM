name: Build Samsung APK v4.1
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev \
            libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good libffi-dev libssl-dev autoconf automake libtool \
            pkg-config cmake ant ccache unzip

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "Cython<3.0" wheel setuptools
          pip install buildozer

      - name: Build with Buildozer
        run: |
          # BƯỚC QUAN TRỌNG: Tự động chấp nhận tất cả License của Android SDK
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Thực hiện build
          buildozer android pydeps
          buildozer -v android debug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Samsung_DeviceManager_v4.1
          path: bin/*.apk
