name: Build MLKit APK Fixed

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3 ccache libncurses6 libstdc++6 zlib1g-dev libffi-dev libssl-dev cmake libjpeg-dev libpng-dev
          pip install --user --upgrade Cython==0.29.33 virtualenv buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Xóa sạch bản build cũ để Gradle tải lại file gradlew sạch
          # Việc này rất quan trọng để tránh lỗi 'gradlew failed'
          rm -rf .buildozer/
          yes | buildozer -v android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BRDM-MLKit-Final
          path: bin/*.apk
